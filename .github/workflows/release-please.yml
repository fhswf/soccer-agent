name: release-please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  packages: write
  id-token: write 

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # Build and push container images when a release is created
      - name: Checkout repository
        if: ${{ steps.release.outputs.release_created }}
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        if: ${{ steps.release.outputs.release_created }}
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry (GHCR)
        if: ${{ steps.release.outputs.release_created }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for MCP Server
        id: meta-mcp
        if: ${{ steps.release.outputs.release_created }}
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/fhswf/soccer-agent/mcp-server
          tags: |
            type=raw,value=${{ steps.release.outputs.version }}
            type=raw,value=${{ steps.release.outputs.major }}.${{ steps.release.outputs.minor }}
            type=raw,value=latest

      - name: Build and push MCP Server Docker Image
        if: ${{ steps.release.outputs.release_created }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: mcp-server/Dockerfile
          push: true
          tags: ${{ steps.meta-mcp.outputs.tags }}
          labels: ${{ steps.meta-mcp.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract metadata for Data Pipeline
        id: meta-pipeline
        if: ${{ steps.release.outputs.release_created }}
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/fhswf/soccer-agent/data-pipeline
          tags: |
            type=raw,value=${{ steps.release.outputs.version }}
            type=raw,value=${{ steps.release.outputs.major }}.${{ steps.release.outputs.minor }}
            type=raw,value=latest

      - name: Build and push Data Pipeline Docker Image
        if: ${{ steps.release.outputs.release_created }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: data-pipeline/Dockerfile
          push: true
          tags: ${{ steps.meta-pipeline.outputs.tags }}
          labels: ${{ steps.meta-pipeline.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
