name: release-please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  packages: write
  id-token: write 

#env:
#  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      mcp_server_release_created: ${{ steps.release.outputs['mcp-server--release_created'] }}
      mcp_server_version: ${{ steps.release.outputs['mcp-server--version'] }}
      mcp_server_major: ${{ steps.release.outputs['mcp-server--major'] }}
      mcp_server_minor: ${{ steps.release.outputs['mcp-server--minor'] }}
      data_pipeline_release_created: ${{ steps.release.outputs['data-pipeline--release_created'] }}
      data_pipeline_version: ${{ steps.release.outputs['data-pipeline--version'] }}
      data_pipeline_major: ${{ steps.release.outputs['data-pipeline--major'] }}
      data_pipeline_minor: ${{ steps.release.outputs['data-pipeline--minor'] }}
    steps:
      - uses: googleapis/release-please-action@v4.1.0
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  build-mcp-server:
    needs: release-please
    if: ${{ needs.release-please.outputs.mcp_server_release_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for MCP Server
        id: meta-mcp
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/fhswf/soccer-agent/mcp-server
          tags: |
            type=raw,value=${{ needs.release-please.outputs.mcp_server_version }}
            type=raw,value=${{ needs.release-please.outputs.mcp_server_major }}.${{ needs.release-please.outputs.mcp_server_minor }}
            type=raw,value=latest

      - name: Build and push MCP Server Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: mcp-server/Dockerfile
          push: true
          tags: ${{ steps.meta-mcp.outputs.tags }}
          labels: ${{ steps.meta-mcp.outputs.labels }}
          cache-from: type=gha,scope=mcp-server
          cache-to: type=gha,mode=max,scope=mcp-server

  build-data-pipeline:
    needs: release-please
    if: ${{ needs.release-please.outputs.data_pipeline_release_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Data Pipeline
        id: meta-pipeline
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/fhswf/soccer-agent/data-pipeline
          tags: |
            type=raw,value=${{ needs.release-please.outputs.data_pipeline_version }}
            type=raw,value=${{ needs.release-please.outputs.data_pipeline_major }}.${{ needs.release-please.outputs.data_pipeline_minor }}
            type=raw,value=latest

      - name: Build and push Data Pipeline Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: data-pipeline/Dockerfile
          push: true
          tags: ${{ steps.meta-pipeline.outputs.tags }}
          labels: ${{ steps.meta-pipeline.outputs.labels }}
          cache-from: type=gha,scope=data-pipeline
          cache-to: type=gha,mode=max,scope=data-pipeline
