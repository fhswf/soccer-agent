apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: wm2026-ingress
  namespace: soccer-agent
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/use-regex: "true"
    # Erhöhe Upload-Größenbegrenzung für Datei-Uploads in JupyterLab/Langflow
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
spec:
  rules:
    - http:
        paths:
          - path: /langflow
            pathType: Prefix
            backend:
              service:
                name: langflow
                port:
                  number: 7860
          - path: /mcp
            pathType: Prefix
            backend:
              service:
                name: mcp-server
                port:
                  number: 9000
          - path: /llm
            pathType: Prefix
            backend:
              service:
                name: litellm
                port:
                  number: 4000
