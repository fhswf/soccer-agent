apiVersion: apps/v1
kind: Deployment
metadata:
  name: litellm
  namespace: soccer-agent
  labels:
    app: litellm
status: {}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: litellm
  template:
    metadata:
      labels:
        app: litellm
    spec:
      containers:
        - name: litellm
          image: ghcr.io/berriai/litellm:main
          args:
            - "--config"
            - "/app/config.yaml"
            - "--port"
            - "4000"
          ports:
            - containerPort: 4000
          env:
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: gemini-secret
                  key: api-key
                  optional: true # Ermöglicht lokales Testen ohne erzwungenes Secret
            - name: OPENAI_API_KEY
              value: "dummy"
          volumeMounts:
            - name: config-volume
              mountPath: /app/config.yaml
              subPath: config.yaml
          resources:
            limits:
              cpu: "1"
              memory: 1Gi
            requests:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: config-volume
          configMap:
            name: litellm-config
---
apiVersion: v1
kind: Service
metadata:
  name: litellm
  namespace: soccer-agent
spec:
  ports:
    - port: 4000
      targetPort: 4000
      name: http
  selector:
    app: litellm
