apiVersion: batch/v1
kind: CronJob
metadata:
  name: news-scraper
  namespace: soccer-agent
spec:
  schedule: "0 */12 * * *" # Alle 12 Stunden ausführen
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: scraper-pipeline
              image: ghcr.io/fhswf/soccer-agent/data-pipeline
              imagePullPolicy: Always
              env:
                - name: CHROMA_HOST
                  value: "chromadb"
                - name: CHROMA_PORT
                  value: "8000"
                - name: OPENAI_BASE_URL
                  value: "https://litellm.fh-swf.cloud/v1"
                - name: OPENAI_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: openai-api-key
                      key: OPENAI_API_KEY
              resources:
                limits:
                  cpu: 500m
                  memory: 512Mi
                requests:
                  cpu: 250m
                  memory: 256Mi
          restartPolicy: OnFailure
