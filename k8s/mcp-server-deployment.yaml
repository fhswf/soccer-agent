apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-server
  namespace: soccer-agent
  labels:
    app: mcp-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcp-server
  template:
    metadata:
      labels:
        app: mcp-server
    spec:
      containers:
        - name: mcp-server
          image: ghcr.io/fhswf/soccer-agent/mcp-server:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 9000
          env:
            - name: DATA_DIR
              value: "/app/data-pipeline/data"
            - name: PORT
              value: "9000"
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 250m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: mcp-server
  namespace: soccer-agent
spec:
  ports:
    - port: 9000
      targetPort: 9000
      name: http
  selector:
    app: mcp-server
